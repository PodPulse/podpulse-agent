syntax = "proto3";

package podpulse.v1;

option go_package = "github.com/podpulse/podpulse-agent/proto/podpulse/v1;v1";

service IncidentService {
  rpc ReportIncident  (IncidentReport)   returns (ReportAck);
  rpc ReportHeartbeat (HeartbeatRequest) returns (HeartbeatAck);
}

message ManifestContext {
  string git_ops_tool       = 1;
  string git_ops_app_name   = 2;
  bool   is_helm_managed    = 3;
  string helm_release_name  = 4;
  string helm_chart         = 5;
  string helm_namespace     = 6;
  // ArgoCD-specific enrichment (populated when tracking-id annotation is present)
  string argo_resource_name = 7; // e.g. "oom-argo"    — from tracking-id {ns}/{name}
  string argo_resource_kind = 8; // e.g. "Deployment"  — from tracking-id {group}/{kind}
  string argo_app_path      = 9; // e.g. "argo/"       — from Application CR spec.source.path
}

message RecentDeploy {
  int64  deployed_at      = 1; // Unix timestamp UTC
  string image_tag        = 2;
  string replica_set_name = 3;
}

message DeployContext {
  repeated RecentDeploy recent_deploys = 1;
}

message IncidentReport {
  string          incident_id       = 1;
  string          incident_type     = 2; // e.g. OOMKilled, CrashLoopBackOff
  string          namespace         = 3;
  string          pod_name          = 4;
  string          node_name         = 5;
  int32           restart_count     = 6;
  string          raw_context       = 7; // JSON-serialized, size-bounded
  int64           detected_at       = 8; // Unix timestamp (UTC)
  ManifestContext manifest_context  = 9;
  DeployContext   deploy_context    = 10;
  string          previous_log_tail = 11;
  string          memory_request    = 12;
  string          cpu_limit         = 13;
  string          cpu_request       = 14;
}

message ReportAck {
  string incident_id = 1;
  bool   accepted    = 2;
}

message HeartbeatRequest {
  string agent_version = 1;
  string cluster_name  = 2;
}

message HeartbeatAck {
  int64 server_time = 1; // UTC Unix timestamp
}
